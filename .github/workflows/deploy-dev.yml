name: Deploy Kevinhome

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_SERVER_IP: 100.83.112.20
  DEPLOY_PATH: D:/GitClone/_HomeProject/kevin-autopilot
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kevin-autopilot
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
  EXPECTED_APP_VERSION: "0.5.11"
  HEALTH_URL: http://100.83.112.20:3023/health
  DOMAIN_HEALTH_URL: https://kevin.sisihome.org/health
  TAILSCALE_BIND_ADDR: 100.83.112.20
  KEVIN_AUTOPILOT_HOST_PORT: "3023"

jobs:
  deploy-kevinhome:
    runs-on: [self-hosted, Windows, X64, kevin-autopilot-prod]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deploy inputs
        shell: powershell
        run: |
          $missing = @()
          if (-not $env:IMAGE_NAME) { $missing += 'IMAGE_NAME' }
          if (-not $env:DEPLOY_PATH) { $missing += 'DEPLOY_PATH' }
          if (-not $env:EXPECTED_APP_VERSION) { $missing += 'EXPECTED_APP_VERSION' }
          if (-not $env:HEALTH_URL) { $missing += 'HEALTH_URL' }
          if (-not $env:DOMAIN_HEALTH_URL) { $missing += 'DOMAIN_HEALTH_URL' }
          if ($missing.Count -gt 0) { throw ('Missing required deploy inputs: ' + ($missing -join ', ')) }

      - name: Sync compose and config locally
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:DEPLOY_PATH | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $env:DEPLOY_PATH 'config') | Out-Null
          Copy-Item -LiteralPath 'docker-compose.kevinhome.yml' -Destination (Join-Path $env:DEPLOY_PATH 'docker-compose.kevinhome.yml') -Force
          Copy-Item -LiteralPath 'config/kevinhome.example.json' -Destination (Join-Path $env:DEPLOY_PATH 'config/kevinhome.example.json') -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $env:DEPLOY_PATH 'data') | Out-Null

      - name: Deploy via local Docker Compose
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location -LiteralPath $env:DEPLOY_PATH
          $dockerConfig = Join-Path $env:TEMP ('kevin-autopilot-docker-config-' + [guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Force -Path $dockerConfig | Out-Null
          $auth = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes('${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}'))
          $configJson = '{"auths":{"ghcr.io":{"auth":"' + $auth + '"}}}'
          [System.IO.File]::WriteAllText((Join-Path $dockerConfig 'config.json'), $configJson, (New-Object System.Text.UTF8Encoding -ArgumentList $false))

          try {
            $env:IMAGE_TAG = $env:IMAGE_TAG
            $env:IMAGE_NAME = $env:IMAGE_NAME
            $env:TAILSCALE_BIND_ADDR = $env:TAILSCALE_BIND_ADDR
            $env:KEVIN_AUTOPILOT_HOST_PORT = $env:KEVIN_AUTOPILOT_HOST_PORT
            docker --config $dockerConfig pull ($env:IMAGE_NAME + ':' + $env:IMAGE_TAG)
            if ($LASTEXITCODE -ne 0) { throw 'docker pull failed.' }
            docker --config $dockerConfig compose -f docker-compose.kevinhome.yml up -d --pull never --force-recreate --no-build --remove-orphans kevin-autopilot
            if ($LASTEXITCODE -ne 0) { throw 'docker compose up failed.' }
            docker --config $dockerConfig compose -f docker-compose.kevinhome.yml ps
          }
          finally {
            Remove-Item -LiteralPath $dockerConfig -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Health check
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            try {
              $response = Invoke-RestMethod -Uri $env:HEALTH_URL -TimeoutSec 10
              $response | ConvertTo-Json -Compress
              if ($response.version -eq $env:EXPECTED_APP_VERSION) { exit 0 }
              Write-Host "Health version $($response.version), expected $env:EXPECTED_APP_VERSION"
            }
            catch {
              Write-Host $_.Exception.Message
            }
            Start-Sleep -Seconds 10
          }
          exit 1

      - name: Domain health check
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            try {
              $response = Invoke-RestMethod -Uri $env:DOMAIN_HEALTH_URL -TimeoutSec 10
              $response | ConvertTo-Json -Compress
              if ($response.version -eq $env:EXPECTED_APP_VERSION) { exit 0 }
              Write-Host "Domain health version $($response.version), expected $env:EXPECTED_APP_VERSION"
            }
            catch {
              Write-Host $_.Exception.Message
            }
            Start-Sleep -Seconds 10
          }
          exit 1

      - name: Deployment Summary
        if: always()
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Kevin Autopilot Deployment Summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: ${{ job.status }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Runner label: kevin-autopilot-prod"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Server: $env:DEPLOY_SERVER_IP"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Deploy path: $env:DEPLOY_PATH"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Image: $env:IMAGE_NAME"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Image tag: $env:IMAGE_TAG"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Health: $env:HEALTH_URL"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Domain health: $env:DOMAIN_HEALTH_URL"
